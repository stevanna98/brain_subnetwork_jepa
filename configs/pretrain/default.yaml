meta:
  seed: 42
  output_dir: /content/drive/MyDrive/IMPERIAL/brain_jepa_subnetworks/
data:
  atlas_csv: /content/drive/MyDrive/IMPERIAL/data/glasser379_to_rsn12.csv
  # --- source: pick one ---
  dict_file: /content/drive/MyDrive/IMPERIAL/data/subject_data_1_cleaned_precise_age.pkl         # path to a .pt dict {subject_id: {BOLD, FC, age, gender}}
  subject_dir: /content/drive/MyDrive/IMPERIAL/brain_jepa_subnetworks/  # used when dict_file is null and synthetic is false
  synthetic: false
  num_synthetic_subjects: 64
  # --- features ---
  node_feature_type: bold  # bold | fc_row | ones
  feature_mode: conv1d     # passthrough | conv1d  (only used when node_feature_type=bold)
  feature_dim: 64          # (only used when node_feature_type=bold)
  bold_key: BOLD              # key for time-series inside each subject dict (FCDictDataset only)
  fc_key: FC                  # key for FC matrix inside each subject dict (FCDictDataset only)
  transpose_bold: false       # set true if BOLD is stored as (T, N) instead of (N, T)
  # --- graph construction ---
  fc_strategy: top_k          # dense | top_k | absolute_threshold | fisher_z_then_threshold
  top_k: 10
  threshold: 0.2
  # --- loader ---
  batch_size: 16
  num_workers: 4

masking:
  num_targets: 1              # M — number of held-out subnetworks per sample
  extra_target_ratio: 0.15    # fraction of remaining nodes also masked (task variety beyond the K RSN-level masks)
  include_cross_edges: false

model:
  encoder_type: gcn           # gcn | graph_transformer
  encoder_hidden: 256
  encoder_out: 512
  encoder_layers: 4
  encoder_heads: 4            # used only for graph_transformer
  encoder_dropout: 0.0
  pooling_mode: mean          # mean | attention
  region_positional_encoding: false  # learnable embedding per brain region — OFF by default (causes collapse shortcut)
  predictor_dim: 384
  predictor_depth: 6
  predictor_heads: 6
  predictor_dropout: 0.0

training:
  num_epochs: 100
  lr: 1.0e-3
  start_lr: 1.0e-5
  final_lr: 1.0e-6
  warmup_epochs: 10
  weight_decay_start: 0.04
  weight_decay_end: 0.4
  clip_grad: 1.0
  var_weight: 0.5       # weight of predictor output variance term
  ctx_var_weight: 1.0  # weight of DIRECT context encoder variance term (key anti-collapse signal)
  cov_weight: 0.1       # VICReg-style covariance penalty on context embeddings (prevents dimensional collapse)
  var_gamma: 0.25       # target std floor; raised from 0.1 because embeddings were pinning at the 0.1 floor (weak dispersion)
  ema_tau_start: 0.99
  ema_tau_end: 1.0

logging:
  log_freq: 10
  checkpoint_freq: 10
  plot_dir: /content/drive/MyDrive/IMPERIAL/brain_jepa_subnetworks/   # folder for loss.png, tau.png, probe_metrics.png
  wandb_project: null         # set to a string to enable W&B

probe:
  freq: 10            # run probe every this many epochs (0 to disable)
  num_subjects: 200   # how many training subjects to use for probe fitting+eval
  train_frac: 0.8     # fraction used to fit the probe (rest is test)
  num_epochs: 50      # probe training epochs
  lr: 1.0e-3
