meta:
  seed: 42

data:
  atlas_csv: data/atlas/glasser379_to_rsn12.csv
  subject_dir: data/subjects
  label_csv: data/labels.csv     # columns: subject_id, label
  fc_strategy: top_k
  top_k: 10
  batch_size: 32
  num_workers: 4

model:
  checkpoint: outputs/pretrain/ckpt_latest.pt
  encoder_type: gcn
  encoder_hidden: 256
  encoder_out: 512
  encoder_layers: 4

probe:
  num_classes: 2
  num_epochs: 100
  lr: 1.0e-3
  weight_decay: 1.0e-4

logging:
  output_dir: outputs/eval
