meta:
  seed: 42

data:
  atlas_csv: /content/drive/MyDrive/IMPERIAL/data/glasser379_to_rsn12.csv
  dict_file: /content/drive/MyDrive/IMPERIAL/data/subject_data_1_cleaned_precise_age.pkl                        # path to your .pkl subject dict
  feature_mode: passthrough               # must match what was used during pretraining
  feature_dim: 64
  bold_key: BOLD
  fc_key: FC
  transpose_bold: false
  fc_strategy: top_k
  top_k: 10
  batch_size: 32
  num_workers: 4
  label_csv: /content/drive/MyDrive/IMPERIAL/data/HCP_YA_subjects_2026_04_02_12_52_45.csv                    # path to CSV with PMAT scores
  label_col: PMAT24_A_CR             # column to predict
  subject_col: Subject               # column with subject IDs

model:
  checkpoint: /content/drive/MyDrive/IMPERIAL/brain_jepa_subnetworks/ckpt_epoch0030.pt
  encoder_type: gcn                  # must match pretraining config
  encoder_hidden: 256
  encoder_out: 512
  encoder_layers: 4

probe:
  num_epochs: 200
  lr: 1.0e-3
  weight_decay: 1.0e-4

logging:
  output_dir: /content/drive/MyDrive/IMPERIAL/brain_jepa_subnetworks/
